name: CI

on:
  push:
  pull_request:

# 同一分支有新 push 時取消尚在跑的舊 run
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 所有 run step 預設在 chisel-template/ 內執行
defaults:
  run:
    working-directory: chisel-template

jobs:
  build-and-test:
    # ubuntu-24.04 的 apt verilator 為 5.x，ChiselSim 需要
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Install Verilator (ChiselSim simulation backend)
        run: sudo apt-get update && sudo apt-get install -y verilator
        working-directory: .

      - name: Compile
        run: sbt compile

      - name: Run ChiselSim tests
        run: sbt test

      - name: Emit SystemVerilog (smoke)
        run: sbt "runMain handout.Main"
